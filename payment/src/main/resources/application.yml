server:
  port: 8088

spring:
  application:
    name: payment

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    enabled: true
  instance:
    prefer-ip-address: true

stripe:
  mock: false
  api-key: ${STRIPE_API_KEY}